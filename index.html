<!DOCTYPE html>
<html>
  <head>

    <style>
      @font-face {
        font-family: 'SG';
        src: url('fonts/ScienceGothic-VariableFont_CTRS,slnt,wdth,wght.ttf') format('truetype');
      }
      .sg {
        font-family: 'SG';
      }
    </style>
    
    <!-- removes /index.html from the website -->
    <script>
      if (window.location.pathname.endsWith('/index.html')) {
        window.location.replace(window.location.pathname.replace(/index\.html$/, 'home'));
      }
    </script>
    
    <title>fireee</title>
    <meta name="description" content="Personal site for fireee.">
    <meta property="og:image" content="https://fireee.cgd.cx/icons/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="manifest" href="favicon/site.webmanifest">

    <meta property="og:type" content="website">
    <meta property="og:title" content="fireee">
    <meta property="og:description" content="fireee's personal site.">
    <meta name="twitter:card" content="summary_large_image">
  </head>

  <body style="margin: 0; background-image: url('imgs/venus-crop-tall.png'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed;">
    <!-- Fixed header -->
    <div class="sg" style="color: white; position: fixed; top: 0; left: 0; width: 100%; background-color: #222; padding: 15px 0; text-align: center; z-index: 1000;">
      Header content
    </div>
  
    <!-- Content starts below the header, flows top to bottom naturally -->
    <div class="sg" style="padding-top: 90px; color:white;">
  
      <div style="display: flex; flex-direction: row; justify-content: center; gap: 100px;">
        <div style="width: 40%; padding: 20px; box-sizing: border-box;">
          Left column
        </div>
        <div style="width: 40%; padding: 20px; box-sizing: border-box;">
          Right column text
        </div>
      </div>
  
    </div>
  
  </body>
</html>
